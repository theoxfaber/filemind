<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileMind | Premium AI Organizer</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-color: #050508;
            --panel-bg: rgba(15, 15, 25, 0.7);
            --accent-primary: #6366f1;
            --accent-secondary: #a855f7;
            --accent-tertiary: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            cursor: default;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #110e2e 0%, #050508 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
        }

        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--accent-tertiary), var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        main {
            padding: 8rem 5% 4rem;
            max-width: 1400px;
            margin: 0 auto;
            perspective: 2000px;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero-section h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }

        .hero-section p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
        }

        #drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 4rem 2rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            position: relative;
        }

        #drop-zone:hover, #drop-zone.dragover {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.05);
            transform: scale(0.99);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: var(--accent-primary);
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 2rem;
            align-items: center;
            justify-content: center;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.8rem 1.2rem;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-container.active {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #334155;
            border-radius: 12px;
            position: relative;
            transition: 0.3s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .active .toggle-switch { background: var(--accent-primary); }
        .active .toggle-switch::after { transform: translateX(20px); }

        .primary-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            display: none;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        #file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .file-status-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .duplicate-badge {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        #results-container {
            margin-top: 6rem;
            display: none;
        }

        #isometric-workspace {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
            perspective: 2000px;
            padding: 2rem 0;
        }

        .category-group {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .category-group:hover {
            transform: rotateX(8deg) rotateY(-8deg) translateZ(30px);
            border-color: var(--accent-primary);
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .category-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .final-file-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-tertiary);
        }

        .reason-tooltip {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
            font-style: italic;
        }

        #global-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .scanner-line {
            width: 300px;
            height: 2px;
            background: var(--accent-tertiary);
            box-shadow: 0 0 20px var(--accent-tertiary);
            position: absolute;
            animation: scan 2s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 0; opacity: 0; }
            50% { top: 100%; opacity: 1; }
        }

        .path-input-group {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            max-width: 500px;
            margin: 2rem auto;
            overflow: hidden;
        }

        .path-input-group input {
            background: transparent;
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            flex-grow: 1;
            outline: none;
        }

        .sync-btn {
            background: var(--accent-tertiary);
            color: black;
            border: none;
            padding: 0 2rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>
    <div id="global-loader">
        <div class="logo" style="margin-bottom: 2rem;">FILEMIND</div>
        <div style="position: relative; height: 100px; width: 300px;">
            <div class="scanner-line"></div>
            <p style="text-align: center; margin-top: 120px; color: var(--accent-tertiary); font-weight: 700;">AI STRATIFYING...</p>
        </div>
    </div>

    <header>
        <div class="logo"><i class="fas fa-brain"></i> FILEMIND</div>
        <button class="toggle-container" onclick="location.reload()">Reset Session</button>
    </header>

    <main>
        <div class="hero-section">
            <h1>Spatial File Intelligence</h1>
            <p>Elevate your filesystem with Antigravity AI stratification.</p>
        </div>

        <section class="glass-panel" id="main-panel">
            <div id="drop-zone">
                <div class="icon-box"><i class="fas fa-plus"></i></div>
                <h3>Drop local files to begin</h3>
                <input type="file" id="file-input" multiple hidden>
            </div>

            <div class="controls-row">
                <div class="toggle-container" id="smart-rename-toggle" onclick="this.classList.toggle('active'); isSmartRename = this.classList.contains('active')">
                    <div class="toggle-switch"></div>
                    <span class="toggle-label">Smart AI Renaming</span>
                </div>
                <button class="primary-btn" id="start-btn" onclick="processFiles()">Stratify Files</button>
            </div>

            <div id="file-list"></div>
        </section>

        <section id="results-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>Results Stratified</h2>
                <button class="toggle-container" onclick="downloadZip()"><i class="fas fa-download"></i> ZIP</button>
            </div>
            <div id="isometric-workspace"></div>
            
            <div class="glass-panel" style="margin-top: 4rem; text-align: center;">
                <h3>Sync to System</h3>
                <div class="path-input-group">
                    <input type="text" id="sync-path" placeholder="Absolute local path...">
                    <button class="sync-btn" onclick="syncLocal()">SYNC</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Init Background
        const bg = document.getElementById('bg-canvas');
        for (let i = 0; i < 8; i++) {
            const orb = document.createElement('div');
            orb.className = 'orb';
            const size = Math.random() * 400 + 300;
            orb.style.width = size + 'px';
            orb.style.height = size + 'px';
            orb.style.left = Math.random() * 100 + '%';
            orb.style.top = Math.random() * 100 + '%';
            orb.style.background = `rgba(${Math.random()*100+100}, 100, 255, 0.2)`;
            bg.appendChild(orb);
            gsap.to(orb, { x: 'random(-200, 200)', y: 'random(-200, 200)', duration: 'random(10, 20)', repeat: -1, yoyo: true, ease: 'sine.inOut' });
        }

        let jobFiles = [];
        let isSmartRename = false;

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const startBtn = document.getElementById('start-btn');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); };
        fileInput.onchange = (e) => handleFiles(e.target.files);

        async function handleFiles(files) {
            const formData = new FormData();
            for (let f of files) formData.append('files', f);
            
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const uploaded = await res.json();
                jobFiles = [...jobFiles, ...uploaded];
                renderFileList();
                startBtn.style.display = 'block';
            } catch (err) { alert("Upload failed"); }
        }

        function renderFileList() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            jobFiles.forEach(f => {
                const card = document.createElement('div');
                card.className = 'file-status-card';
                card.innerHTML = `
                    <i class="far fa-file"></i>
                    <div style="flex-grow:1; min-width:0;">
                        <div style="font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${f.filename}</div>
                        <div style="font-size:0.8rem; color:var(--text-secondary)">${(f.size/1024).toFixed(1)} KB ${f.is_duplicate ? '<span class="duplicate-badge">Duplicate</span>' : ''}</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function processFiles() {
            document.getElementById('global-loader').style.display = 'flex';
            
            // Get initial results count to handle accumulation
            const initialRes = await fetch('/results');
            const initialData = await initialRes.json();
            const initialCount = initialData.length || 0;

            await fetch('/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_ids: jobFiles.map(f => f.id), use_smart_rename: isSmartRename })
            });

            const poller = setInterval(async () => {
                try {
                    const res = await fetch('/results');
                    const data = await res.json();
                    
                    // We wait until the manifest contains at least (initial + current batch) items
                    if (data.length >= initialCount + jobFiles.filter(f => !f.is_duplicate).length) {
                        clearInterval(poller);
                        displayResults(data);
                    }
                } catch (e) {
                    console.error("Poller error:", e);
                }
            }, 1500);
        }

        function displayResults(results) {
            document.getElementById('global-loader').style.display = 'none';
            document.getElementById('main-panel').style.display = 'none';
            document.getElementById('results-container').style.display = 'block';
            
            const workspace = document.getElementById('isometric-workspace');
            workspace.innerHTML = '';
            const groups = {};
            results.forEach(r => { 
                if(!groups[r.category]) groups[r.category] = []; 
                groups[r.category].push(r); 
            });

            const icons = { 
                'Invoices': 'fa-file-invoice-dollar', 
                'Photos': 'fa-image', 
                'Code': 'fa-code', 
                'Docs': 'fa-file-lines', 
                'Needs Review': 'fa-user-shield',
                'Misc': 'fa-cube'
            };

            Object.entries(groups).forEach(([cat, files], idx) => {
                const panel = document.createElement('div');
                panel.className = 'category-group';
                panel.innerHTML = `
                    <div class="category-header">
                        <div class="category-icon"><i class="fas ${icons[cat] || 'fa-folder'}"></i></div>
                        <div style="font-weight:700">${cat}</div>
                    </div>
                    ${files.map(f => `<div class="final-file-card">
                        <div style="display:flex; justify-content:space-between">
                            <strong>${f.final_filename || f.filename}</strong> 
                            <small>${Math.round(f.confidence)}%</small>
                        </div>
                        <div class="reason-tooltip">${f.reasoning}</div>
                    </div>`).join('')}
                `;
                workspace.appendChild(panel);
                gsap.from(panel, { 
                    y: 50, 
                    opacity: 0, 
                    rotationX: 45, 
                    duration: 1, 
                    delay: idx * 0.1, 
                    ease: 'expo.out' 
                });
            });
        }

        async function downloadZip() { window.location.href = '/download'; }
        async function syncLocal() {
            const path = document.getElementById('sync-path').value;
            const res = await fetch('/sync', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ target_path: path }) });
            const data = await res.json();
            alert(data.status === "success" ? "Stratified to system!" : "Sync failed");
        }
    </script>
</body>
</html>
